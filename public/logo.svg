<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 160" width="560" height="160">
  <!-- ── TREE MARK (left, 140×140 centred in 160×160 box) ────── -->
  <g transform="translate(10,10) scale(0.35) translate(-24,-200)">
    <!-- Open book base -->
    <path d="M42,348 Q130,320 196,328 L196,345 Q130,338 42,365 Z" fill="#0D1B3E"/>
    <path d="M204,328 Q272,320 358,348 L358,365 Q272,338 204,345 Z" fill="#152444"/>

    <!-- Trunk -->
    <path d="M192,342 C194,295 197,248 200,195 C203,248 206,295 208,342 Z" fill="#0D1B3E"/>

    <!-- Branches -->
    <line x1="200" y1="250" x2="145" y2="218" stroke="#0D1B3E" stroke-width="11" stroke-linecap="round"/>
    <line x1="200" y1="234" x2="256" y2="200" stroke="#0D1B3E" stroke-width="11" stroke-linecap="round"/>
    <line x1="200" y1="220" x2="176" y2="178" stroke="#0D1B3E" stroke-width="9"  stroke-linecap="round"/>
    <line x1="200" y1="216" x2="226" y2="175" stroke="#0D1B3E" stroke-width="9"  stroke-linecap="round"/>

    <!-- Leaves -->
    <ellipse cx="105" cy="288" rx="20" ry="34" fill="#1A237E" transform="rotate(-52,105,288)"/>
    <ellipse cx="80"  cy="264" rx="19" ry="32" fill="#1A237E" transform="rotate(-62,80,264)"/>
    <ellipse cx="76"  cy="237" rx="20" ry="33" fill="#283593" transform="rotate(-68,76,237)"/>
    <ellipse cx="92"  cy="208" rx="20" ry="33" fill="#1565C0" transform="rotate(-58,92,208)"/>
    <ellipse cx="115" cy="184" rx="20" ry="33" fill="#1976D2" transform="rotate(-46,115,184)"/>
    <ellipse cx="146" cy="163" rx="20" ry="33" fill="#0288D1" transform="rotate(-30,146,163)"/>
    <ellipse cx="174" cy="151" rx="20" ry="33" fill="#00ACC1" transform="rotate(-14,174,151)"/>
    <ellipse cx="200" cy="146" rx="21" ry="35" fill="#00C853" transform="rotate(0,200,146)"/>
    <ellipse cx="226" cy="151" rx="20" ry="33" fill="#4CAF50" transform="rotate(14,226,151)"/>
    <ellipse cx="254" cy="163" rx="20" ry="33" fill="#26C6DA" transform="rotate(30,254,163)"/>
    <ellipse cx="282" cy="184" rx="20" ry="33" fill="#00ACC1" transform="rotate(46,282,184)"/>
    <ellipse cx="303" cy="208" rx="20" ry="33" fill="#0097A7" transform="rotate(58,303,208)"/>
    <ellipse cx="320" cy="237" rx="20" ry="33" fill="#1565C0" transform="rotate(68,320,237)"/>
    <ellipse cx="316" cy="264" rx="19" ry="32" fill="#1A237E" transform="rotate(62,316,264)"/>
    <ellipse cx="292" cy="288" rx="20" ry="34" fill="#1A237E" transform="rotate(52,292,288)"/>
  </g>

  <!-- ── VERTICAL DIVIDER ────────────────────────────────────── -->
  <line x1="158" y1="22" x2="158" y2="138" stroke="#CBD5E1" stroke-width="1.5"/>

  <!-- ── WORDMARK ───────────────────────────────────────────── -->
  <!-- "WinTrail" dark navy + "AI" teal on same baseline -->
  <text font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="54" font-weight="900"
        y="88" letter-spacing="-1">
    <tspan x="176" fill="#0D1B3E">WinTrail</tspan><tspan fill="#00BFA5"> AI</tspan>
  </text>

  <!-- Tagline -->
  <text x="177" y="118" font-family="'Inter','Helvetica Neue',Arial,sans-serif"
        font-size="14" font-weight="600" fill="#00BFA5" letter-spacing="2.5">
    LEARN TODAY. LEAD TOMORROW.
  </text>
</svg>
