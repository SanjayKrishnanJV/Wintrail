<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!-- Background -->
  <rect width="1024" height="1024" rx="230" fill="#080C16"/>

  <!-- Subtle grid dots -->
  <pattern id="grid" x="0" y="0" width="64" height="64" patternUnits="userSpaceOnUse">
    <circle cx="32" cy="32" r="2" fill="rgba(255,255,255,0.06)"/>
  </pattern>
  <rect width="1024" height="1024" rx="230" fill="url(#grid)"/>

  <!-- Glow behind icon -->
  <ellipse cx="512" cy="490" rx="280" ry="240" fill="#2563EB" opacity="0.18"/>

  <!-- Brain / neural network mark -->
  <!-- Central node -->
  <circle cx="512" cy="440" r="56" fill="#2563EB"/>
  <circle cx="512" cy="440" r="44" fill="#1D4ED8"/>
  <circle cx="512" cy="440" r="20" fill="white" opacity="0.95"/>

  <!-- Satellite nodes -->
  <circle cx="320" cy="340" r="32" fill="#3B82F6"/>
  <circle cx="704" cy="340" r="32" fill="#3B82F6"/>
  <circle cx="280" cy="540" r="24" fill="#60A5FA"/>
  <circle cx="744" cy="540" r="24" fill="#60A5FA"/>
  <circle cx="420" cy="620" r="28" fill="#3B82F6"/>
  <circle cx="604" cy="620" r="28" fill="#3B82F6"/>
  <circle cx="512" cy="680" r="20" fill="#93C5FD"/>

  <!-- Connector lines -->
  <line x1="512" y1="440" x2="320" y2="340" stroke="#3B82F6" stroke-width="8" stroke-linecap="round" opacity="0.7"/>
  <line x1="512" y1="440" x2="704" y2="340" stroke="#3B82F6" stroke-width="8" stroke-linecap="round" opacity="0.7"/>
  <line x1="512" y1="440" x2="280" y2="540" stroke="#60A5FA" stroke-width="6" stroke-linecap="round" opacity="0.6"/>
  <line x1="512" y1="440" x2="744" y2="540" stroke="#60A5FA" stroke-width="6" stroke-linecap="round" opacity="0.6"/>
  <line x1="512" y1="440" x2="420" y2="620" stroke="#3B82F6" stroke-width="7" stroke-linecap="round" opacity="0.65"/>
  <line x1="512" y1="440" x2="604" y2="620" stroke="#3B82F6" stroke-width="7" stroke-linecap="round" opacity="0.65"/>
  <line x1="512" y1="440" x2="512" y2="680" stroke="#93C5FD" stroke-width="5" stroke-linecap="round" opacity="0.5"/>

  <!-- Cross-connections -->
  <line x1="320" y1="340" x2="280" y2="540" stroke="#3B82F6" stroke-width="4" stroke-linecap="round" opacity="0.35"/>
  <line x1="704" y1="340" x2="744" y2="540" stroke="#3B82F6" stroke-width="4" stroke-linecap="round" opacity="0.35"/>
  <line x1="420" y1="620" x2="604" y2="620" stroke="#60A5FA" stroke-width="4" stroke-linecap="round" opacity="0.4"/>

  <!-- "LF" wordmark at bottom -->
  <text x="512" y="870" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="96" font-weight="800" fill="white" text-anchor="middle" letter-spacing="-2">Wintrail</text>
  <text x="512" y="950" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="46" font-weight="500" fill="#60A5FA" text-anchor="middle" letter-spacing="8">AI</text>
</svg>
